name: Complete CI/CD Pipeline - Spring Boot

on:
  push:
    branches: [ "main", "develop", "staging" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.0'

jobs:
  # Job 1: Vérifications de qualité du code
  quality-checks:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven
    
    - name: Run Maven Clean
      run: mvn clean
    
    - name: Run Tests with Maven
      run: mvn test
    
    - name: Run SonarQube Analysis (if configured)
      run: mvn sonar:sonar
      continue-on-error: true
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    
    - name: Check Code Coverage
      run: mvn jacoco:report
      continue-on-error: true
    
    - name: Run Checkstyle (Code Style)
      run: mvn checkstyle:check
      continue-on-error: true
    
    - name: Run SpotBugs (Bug Detection)
      run: mvn spotbugs:check
      continue-on-error: true
    
    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-reports
        path: target/surefire-reports/
        retention-days: 30
    
    - name: Upload Coverage Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports
        path: target/site/jacoco/
        retention-days: 30

  # Job 2: Build multi-versions Java
  build:
    needs: quality-checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['17', '21', '23']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn -B package -DskipTests
    
    - name: Verify JAR exists
      run: |
        if [ ! -f "target/*.jar" ]; then
          echo "❌ Build failed: JAR file not found"
          exit 1
        fi
        JAR_SIZE=$(ls -lh target/*.jar | awk '{print $5}')
        echo "✅ Build successful - JAR Size: $JAR_SIZE"
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-java-${{ matrix.java-version }}
        path: target/*.jar
        retention-days: 5

  # Job 3: Sécurité et vulnérabilités
  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven
    
    - name: Run Maven Dependency Check
      run: mvn dependency-check:check
      continue-on-error: true
    
    - name: Run OWASP Top 10 Check
      run: mvn verify -Powasp
      continue-on-error: true
    
    - name: Scan with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
    
    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

  # Job 4: Tests d'intégration
  integration-tests:
    needs: build
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
          MYSQL_ROOT_PASSWORD: root_password
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven
    
    - name: Run Integration Tests
      run: mvn verify -Pintegration-tests
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: test_db
        DB_USER: test_user
        DB_PASSWORD: test_password
      continue-on-error: true
    
    - name: Upload Integration Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: target/failsafe-reports/
        retention-days: 30

  # Job 5: Performance et Load Tests
  performance-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven
    
    - name: Build for Performance Tests
      run: mvn clean package -DskipTests
    
    - name: Start Spring Boot Application
      run: |
        java -jar target/*.jar &
        sleep 10
    
    - name: Run JMeter Load Tests (if configured)
      run: mvn jmeter:execute
      continue-on-error: true
    
    - name: Run Gatling Tests (if configured)
      run: mvn gatling:test
      continue-on-error: true
    
    - name: Upload Performance Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-results
        path: target/jmeter-results/
        retention-days: 30

  # Job 6: Docker Build (optionnel)
  docker-build:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven
    
    - name: Build JAR
      run: mvn clean package -DskipTests
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      continue-on-error: true
    
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/my-spring-app:latest
          ${{ secrets.DOCKER_USERNAME }}/my-spring-app:${{ github.sha }}
      continue-on-error: true

  # Job 7: SonarQube Code Quality
  sonarqube:
    needs: quality-checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        cache: maven
    
    - name: Cache SonarQube packages
      uses: actions/cache@v3
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
    
    - name: Build and analyze
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
      continue-on-error: true

  # Job 8: Deploy to Staging (optionnel)
  deploy-staging:
    needs: [quality-checks, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-java-21
    
    - name: Deploy to Staging Server
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        STAGING_SERVER: ${{ secrets.STAGING_SERVER }}
      run: |
        echo "Deploying to staging: $STAGING_SERVER"
        # Exemple: scp *.jar user@staging-server:/app/
        # ssh user@staging-server 'systemctl restart spring-app'
      continue-on-error: true

  # Job 9: Deploy to Production (optionnel)
  deploy-production:
    needs: [quality-checks, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-java-21
    
    - name: Deploy to Production Server
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        PROD_SERVER: ${{ secrets.PROD_SERVER }}
      run: |
        echo "⚠️ Deploying to production: $PROD_SERVER"
        # Exemple: scp *.jar user@prod-server:/app/
        # ssh user@prod-server 'systemctl restart spring-app'
      continue-on-error: true

  # Job 10: Health Check
  health-check:
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Health Check - Staging
      run: |
        echo "Checking staging server health..."
        # curl -f ${{ secrets.STAGING_URL }}/health || true
      continue-on-error: true
    
    - name: Health Check - Production
      run: |
        echo "Checking production server health..."
        # curl -f ${{ secrets.PROD_URL }}/health || true
      continue-on-error: true

  # Job 11: Notifications
  notify-success:
    needs: [quality-checks, build, security]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - name: Notify Success
      run: |
        echo "✅ CI/CD Pipeline Successful!"
        echo "✅ Tests passed"
        echo "✅ Build successful (Java 17, 21, 23)"
        echo "✅ Security checks completed"
        echo "✅ Ready to merge/deploy!"

  notify-failure:
    needs: [quality-checks, build, security]
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
    - name: Notify Failure
      run: |
        echo "❌ CI/CD Pipeline Failed!"
        echo "❌ Please check the logs above"
        echo "❌ Fix issues before pushing again"
